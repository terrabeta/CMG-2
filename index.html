<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WIDE_MCR_TOOLS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
:root{
 --bg-color: #bfbfbf;
 --bg-secondary: #0d0d0d;
 --panel-bg: rgba(28, 28, 30, 0.72);
 --panel-border: rgba(255, 255, 255, 0.08);
 --glass-bg: rgba(44, 44, 46, 0.65);
 --glass-border: rgba(255, 255, 255, 0.1);
 --accent-blue: #0A84FF;
 --accent-green: #30D158;
 --accent-red: #FF453A;
 --accent-orange: #FF9F0A;
 --accent-purple: #BF5AF2;
 --accent-pink: #FF375F;
 --accent-teal: #64D2FF;
 --accent-crawl: #00FC93;
 --text-primary: #FFFFFF;
 --text-secondary: rgba(255, 255, 255, 0.55);
 --text-tertiary: rgba(255, 255, 255, 0.25);
 --header-height: 56px;
 --radius-sm: 8px;
 --radius-md: 12px;
 --radius-lg: 16px;
 --radius-xl: 20px;
 --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
 --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.4);
 --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
 --anim: 0.15s ease-in-out;
 --anim-fast: 0.1s ease-in-out;
 --anim-med: 0.2s ease-in-out;
}

*{box-sizing:border-box;margin:0;padding:0;transition: all var(--anim);}
html,body{height:100%;width:100%}

body{
 background-color: #00180e;
 background: var(--bg-color);
 background-image: 
   radial-gradient(ellipse at top left, rgba(10, 132, 255, 0.08) 0%, transparent 50%),
   radial-gradient(ellipse at bottom right, rgba(191, 90, 242, 0.06) 0%, transparent 50%);
 color: var(--text-primary);
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
 height:100vh;
 width:100vw;
 overflow:hidden;
 display:flex;
 flex-direction: column;
 -webkit-font-smoothing: antialiased;
 -moz-osx-font-smoothing: grayscale;
}

#main-container {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.stream-card{
  background: var(--bg-secondary);
  display:flex;
  flex-direction:column;
  width:100%;
  height:100%;
  overflow:hidden;
}
.stream-card:hover {z-index: 5;background: #111;}

.header-row{
  display:flex;
  width:100%;
  height:var(--header-height);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header-row:hover {background: rgba(60, 60, 62, 0.75);}

.card-header{
  height:100%;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0 16px;
  text-align:center;
  flex:1;
  min-width:0;
  position: relative;
  overflow: hidden;
}
.card-header:hover{background: rgba(255, 255, 255, 0.08);}
.card-header:active{background: rgba(255, 255, 255, 0.12);}

.stream-title{
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1 1 auto;
  text-align:center;
  text-shadow: 0 0 0 transparent;
}
.card-header:hover .stream-title{color: var(--text-primary);text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);}

.viewer-badge{
  height:100%;
  display:none;
  align-items:center;
  justify-content:flex-end;
  padding: 0 12px;
  flex-shrink:0;
  min-width: 100px;
  box-shadow: inset 0 0 0 transparent;
}
.viewer-badge:hover {filter: brightness(1.15);box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.1);}
.badge-1,.badge-2,.badge-3,.badge-4 {background: #b8b8b8;color: #1a1a1a;}
.badge-content{
  display:flex;
  align-items:center;
  justify-content: flex-end;
  gap: 6px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.2px;
  font-variant-numeric: tabular-nums;
  min-width: 70px;
  text-align: right;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.badge-content span {display: inline-block;flex: 1;text-align: right;}
.badge-content svg{
  width: 20px;
  height: 20px;
  fill: currentColor;
  opacity: 0.9;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}
.viewer-badge:hover .badge-content svg {opacity: 1;filter: drop-shadow(0 0 8px currentColor);}

.close-btn{
  height:100%;
  width: 48px;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(255, 255, 255, 0.06);
  border:none;
  color: var(--text-secondary);
  font-size: 18px;
  font-weight: 400;
  cursor:pointer;
  flex-shrink:0;
}
.close-btn:hover{background: var(--accent-red);color: #fff;box-shadow: 0 0 20px rgba(255, 69, 58, 0.4);}
.close-btn:active{opacity: 0.8;}
.close-btn svg {filter: drop-shadow(0 0 0 transparent);}
.close-btn:hover svg {transform: rotate(90deg);filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));}

.video-container{
  flex: 1;
  position:relative;
  background:#000;
  overflow: hidden;
  min-height: 0;
}
.stream-card:hover .video-container {box-shadow: inset 0 0 50px rgba(255,255,255,0.02);}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

.chat-container{
  flex: 1;
  position: relative;
  background: #0f0f0f;
  overflow: hidden;
  min-height: 0;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}
.chat-container iframe{
  position:absolute;
  top:0;
  left:0;
  width:80%;
  height:80%;
  transform:scale(1.25);
  transform-origin:top left;
  border:none;
  background: #0f0f0f;
}

.placeholder{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color: var(--text-tertiary);
  gap: 6px;
  cursor: pointer;
}
.placeholder:hover {background: rgba(255,255,255,0.02);}
.placeholder:hover h1 {opacity: 0.6;text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);}
.placeholder:hover p {opacity: 0.8;color: var(--text-secondary);}
.placeholder h1{font-size: 36px;font-weight: 700;opacity: 0.4;letter-spacing: -1px;text-shadow: 0 0 0 transparent;pointer-events: none;}
.placeholder p{font-size: 11px;font-weight: 500;opacity: 0.5;pointer-events: none;}
.placeholder.chat-placeholder {cursor: default;pointer-events: none;}
.placeholder.chat-placeholder h1 {font-size: 16px;opacity: 0.3;}

#modal-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index:9999;
  display:none;
  justify-content:center;
  align-items:center;
  opacity: 0;
}
#modal-overlay.active {opacity: 1;}
.modal-box{
  background: var(--glass-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  width: 420px;
  padding: 24px;
  display:flex;
  flex-direction:column;
  gap: 16px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
}
#modal-overlay.active .modal-box {opacity: 1;}
.modal-title{color: var(--text-primary);font-size: 17px;font-weight: 600;text-align: center;padding-bottom: 8px;}
.modal-input{
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 14px 16px;
  font-size: 15px;
  font-family: inherit;
  width:100%;
  outline: none;
}
.modal-input::placeholder{color: var(--text-tertiary);}
.modal-input:focus{border-color: var(--accent-blue);box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.25), 0 0 20px rgba(10, 132, 255, 0.15);}
.modal-actions{display:flex;justify-content: center;gap: 10px;padding-top: 8px;}
.btn-modal{padding: 12px 24px;font-weight: 600;font-size: 15px;font-family: inherit;cursor:pointer;border: none;border-radius: var(--radius-md);}
.btn-modal:active{opacity: 0.8;}
.btn-cancel{background: rgba(255, 255, 255, 0.1);color: var(--text-primary);}
.btn-cancel:hover{background: rgba(255, 255, 255, 0.18);box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);}
.btn-confirm{background: var(--accent-blue);color: #fff;}
.btn-confirm:hover{background: #0077ED;box-shadow: 0 0 25px rgba(10, 132, 255, 0.5);}

::-webkit-scrollbar {width: 8px;height: 8px;}
::-webkit-scrollbar-track {background: transparent;}
::-webkit-scrollbar-thumb {background: rgba(255, 255, 255, 0.15);border-radius: 4px;}
::-webkit-scrollbar-thumb:hover {background: rgba(255, 255, 255, 0.25);}
::selection {background: rgba(10, 132, 255, 0.4);}

@media (max-width:1400px){
  #main-container { 
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
}

@media (max-width:768px){
  #main-container { 
    grid-template-columns: 1fr;
    grid-template-rows: repeat(4, 1fr);
  }
}
    </style>
  </head>

    <script>
function onYouTubeIframeAPIReady() {
  if (window.app) {
    window.app.ytApiReady = true;
    window.app.onYTApiReady();
  }
}

class StreamApp {
  constructor() {
    this.modal = document.getElementById('modal-overlay');
    this.inputUrl = document.getElementById('modal-url');
    this.activeSlot = null;
    this.slotStates = {};
    this.players = {};
    this.ytApiReady = false;
    this.pendingLoads = [];
    this.currentUnmutedSlot = null;
    this.muteCheckInterval = null;
    this.TARGET_QUALITY = 'hd720';
    this.STORAGE_KEY = 'streamCommandConfig_v2';
    this.MIN_INTERVAL_MS = 4000;
    this.FETCH_TIMEOUT = 6000;
    this.CORS_PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];
    this.userIconSVG = '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
    this.loadConfig();
  }

  onYTApiReady() {
    this.pendingLoads.forEach(item => this.createYTPlayer(item.slot, item.vidId));
    this.pendingLoads = [];
    this.startMutePolling();
  }

  setQuality720p(player) {
    try {
      if (player && typeof player.setPlaybackQuality === 'function') player.setPlaybackQuality(this.TARGET_QUALITY);
      if (player && typeof player.setPlaybackQualityRange === 'function') player.setPlaybackQualityRange(this.TARGET_QUALITY, this.TARGET_QUALITY);
    } catch(e) {}
  }

  createYTPlayer(slot, vidId) {
    const ph = document.getElementById(`ph-${slot}`);
    const container = document.getElementById(`player-${slot}`)?.parentElement;
    if (!container) return;
    if (this.players[slot]) { try { this.players[slot].destroy(); } catch(e) {} delete this.players[slot]; }
    const oldDiv = document.getElementById(`player-${slot}`);
    if (oldDiv) oldDiv.remove();
    const newDiv = document.createElement('div');
    newDiv.id = `player-${slot}`;
    newDiv.style.cssText = 'display:block;position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;';
    container.appendChild(newDiv);
    if (ph) ph.style.display = 'none';
    this.players[slot] = new YT.Player(`player-${slot}`, {
      videoId: vidId,
      host: 'https://www.youtube-nocookie.com',
      playerVars: { autoplay: 1, mute: 1, controls: 1, disablekb: 0, enablejsapi: 1, fs: 1, iv_load_policy: 3, modestbranding: 1, playsinline: 1, rel: 0, showinfo: 0, cc_load_policy: 0, origin: window.location.origin, vq: 'hd720' },
      events: { 'onReady': (e) => this.onPlayerReady(e, slot), 'onStateChange': (e) => this.onPlayerStateChange(e, slot), 'onPlaybackQualityChange': (e) => this.onQualityChange(e, slot), 'onError': (e) => this.onPlayerError(e, slot) }
    });
  }

  onPlayerReady(event, slot) { const player = event.target; player.playVideo(); this.setQuality720p(player); const playerDiv = document.getElementById(`player-${slot}`); if (playerDiv) playerDiv.style.opacity = '1'; }
  onPlayerStateChange(event, slot) { if (event.data === YT.PlayerState.PLAYING) this.setQuality720p(event.target); }
  onQualityChange(event, slot) { if (event.data !== this.TARGET_QUALITY) this.setQuality720p(event.target); }
  onPlayerError(event, slot) {}

  startMutePolling() { if (this.muteCheckInterval) return; this.muteCheckInterval = setInterval(() => this.enforceSingleUnmuted(), 250); }

  enforceSingleUnmuted() {
    const slots = Object.keys(this.players);
    let unmutedSlots = [];
    for (const slot of slots) { const player = this.players[slot]; if (!player) continue; try { if (typeof player.isMuted === 'function' && !player.isMuted()) unmutedSlots.push(slot); } catch(e) {} }
    if (unmutedSlots.length > 1) { const newUnmuted = unmutedSlots.find(s => s !== this.currentUnmutedSlot) || unmutedSlots[0]; for (const slot of unmutedSlots) { if (slot !== newUnmuted && this.players[slot]) { try { this.players[slot].mute(); } catch(e) {} } } this.currentUnmutedSlot = newUnmuted; } else if (unmutedSlots.length === 1) { this.currentUnmutedSlot = unmutedSlots[0]; } else { this.currentUnmutedSlot = null; }
  }

  buildChatUrl(vidId) { 
    const domain = window.location.hostname || 'localhost'; 
    return `https://www.youtube.com/live_chat?v=${vidId}&embed_domain=${domain}&dark_theme=1`; 
  }

  loadChat(slot, vidId) {
    const chatFrame = document.getElementById(`frame-chat-${slot}`);
    const chatPh = document.getElementById(`ph-chat-${slot}`);
    if (chatFrame && chatPh) {
      chatPh.style.display = 'none';
      chatFrame.style.display = 'block';
      chatFrame.src = this.buildChatUrl(vidId);
    }
  }

  clearChat(slot) {
    const chatFrame = document.getElementById(`frame-chat-${slot}`);
    const chatPh = document.getElementById(`ph-chat-${slot}`);
    if (chatFrame) {
      chatFrame.style.display = 'none';
      chatFrame.src = '';
    }
    if (chatPh) {
      chatPh.style.display = 'flex';
    }
  }

  saveConfig() { 
    try { 
      const config = {}; 
      ['1', '2', '3', '4'].forEach(slot => { 
        const st = this.slotStates[slot]; 
        if (st && st.vidId) { 
          const titleEl = document.getElementById(`title-${slot}`); 
          config[slot] = { 
            vidId: st.vidId, 
            streamTitle: titleEl ? titleEl.innerText : null, 
            url: st.originalUrl || null 
          }; 
        } 
      }); 
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(config)); 
    } catch (e) {} 
  }

  loadConfig() { 
    try { 
      const saved = localStorage.getItem(this.STORAGE_KEY); 
      if (!saved) return; 
      const config = JSON.parse(saved); 
      if (!config || typeof config !== 'object') return; 
      Object.keys(config).forEach((slot, index) => { 
        const data = config[slot]; 
        if (data && data.vidId) { 
          setTimeout(() => this.restoreStream(slot, data.vidId, data.streamTitle, data.url), index * 500); 
        } 
      }); 
    } catch (e) {} 
  }

  restoreStream(slot, vidId, streamTitle, originalUrl) {
    if (!slot || !vidId) return;
    const titleEl = document.getElementById(`title-${slot}`);
    if (titleEl) { 
      if (streamTitle && streamTitle !== 'Click to Add Stream' && streamTitle !== 'Connecting...') { 
        titleEl.innerText = streamTitle; 
        titleEl.style.color = 'var(--text-primary)'; 
      } else { 
        titleEl.innerText = 'Connecting...'; 
        titleEl.style.color = 'var(--accent-blue)'; 
      } 
    }
    if (this.ytApiReady && window.YT && window.YT.Player) { 
      this.createYTPlayer(slot, vidId); 
    } else { 
      this.pendingLoads.push({ slot, vidId }); 
    }
    
    this.loadChat(slot, vidId);
    
    this._ensureSlotState(slot); 
    this.slotStates[slot].vidId = vidId; 
    this.slotStates[slot].originalUrl = originalUrl;
    const badge = document.getElementById(`badge-${slot}`); 
    if (badge) badge.style.display = 'flex';
    const closeBtn = document.getElementById(`close-${slot}`); 
    if (closeBtn) closeBtn.style.display = 'flex';
    this._startRealtimeLoop(slot);
    if (!streamTitle || streamTitle === 'Click to Add Stream' || streamTitle === 'Connecting...') { 
      this.fetchStreamTitle(originalUrl || `https://www.youtube.com/watch?v=${vidId}`, slot); 
    }
  }

  openModal(slotId) { 
    this.activeSlot = slotId; 
    if (this.modal) { 
      this.modal.style.display = 'flex'; 
      requestAnimationFrame(() => this.modal.classList.add('active')); 
    } 
    if (this.inputUrl) { 
      this.inputUrl.value = ''; 
      setTimeout(() => this.inputUrl.focus(), 100); 
    } 
  }
  
  closeModal() { 
    if (this.modal) { 
      this.modal.classList.remove('active'); 
      setTimeout(() => this.modal.style.display = 'none', 150); 
    } 
    this.activeSlot = null; 
  }
  
  confirmModal() { 
    if (!this.activeSlot) return; 
    const url = (this.inputUrl?.value || '').trim(); 
    const vidId = this.getId(url); 
    if (!vidId) { 
      alert('Invalid YouTube URL'); 
      return; 
    } 
    const slot = this.activeSlot; 
    this.closeModal(); 
    this.loadVideo(slot, vidId, url); 
    this.fetchStreamTitle(url, slot); 
  }

  loadVideo(slot, vidId, originalUrl = null) {
    if (!slot || !vidId) return;
    this._stopRealtimeLoop(slot);
    const titleEl = document.getElementById(`title-${slot}`); 
    if (titleEl) { 
      titleEl.innerText = 'Connecting...'; 
      titleEl.style.color = 'var(--accent-blue)'; 
    }
    if (this.ytApiReady && window.YT && window.YT.Player) { 
      this.createYTPlayer(slot, vidId); 
    } else { 
      this.pendingLoads = this.pendingLoads.filter(p => p.slot !== slot); 
      this.pendingLoads.push({ slot, vidId }); 
    }
    
    this.loadChat(slot, vidId);
    
    this._ensureSlotState(slot); 
    this.slotStates[slot].vidId = vidId; 
    this.slotStates[slot].originalUrl = originalUrl;
    const badge = document.getElementById(`badge-${slot}`); 
    if (badge) badge.style.display = 'flex';
    const closeBtn = document.getElementById(`close-${slot}`); 
    if (closeBtn) closeBtn.style.display = 'flex';
    this._startRealtimeLoop(slot); 
    this.saveConfig();
  }

  closeStream(slot) {
    if (!slot) return;
    this._stopRealtimeLoop(slot);
    const titleEl = document.getElementById(`title-${slot}`); 
    if (titleEl) { 
      titleEl.innerText = 'Click to Add Stream'; 
      titleEl.style.color = ''; 
    }
    if (this.players[slot]) { 
      try { this.players[slot].destroy(); } catch(e) {} 
      delete this.players[slot]; 
    }
    const container = document.getElementById(`player-${slot}`)?.parentElement;
    if (container) { 
      const oldDiv = document.getElementById(`player-${slot}`); 
      if (oldDiv) oldDiv.remove(); 
      const newDiv = document.createElement('div'); 
      newDiv.id = `player-${slot}`; 
      newDiv.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;'; 
      container.appendChild(newDiv); 
    }
    const ph = document.getElementById(`ph-${slot}`); 
    if (ph) ph.style.display = 'flex';
    const badge = document.getElementById(`badge-${slot}`); 
    if (badge) badge.style.display = 'none';
    const closeBtn = document.getElementById(`close-${slot}`); 
    if (closeBtn) closeBtn.style.display = 'none';
    
    this.clearChat(slot);
    
    if (this.slotStates[slot]) { 
      this.slotStates[slot].vidId = null; 
      this.slotStates[slot].originalUrl = null; 
    }
    if (this.currentUnmutedSlot === slot) this.currentUnmutedSlot = null;
    this.saveConfig();
  }

  async fetchStreamTitle(videoUrl, slot) { 
    try { 
      const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(videoUrl)}`); 
      const data = await res.json(); 
      const titleEl = document.getElementById(`title-${slot}`); 
      if (!titleEl) return; 
      if (data.title) { 
        titleEl.innerText = data.title; 
        titleEl.style.color = 'var(--text-primary)'; 
      } else if (data.author_name) {
        titleEl.innerText = data.author_name; 
        titleEl.style.color = 'var(--text-secondary)'; 
      } else { 
        titleEl.innerText = 'Live Stream'; 
        titleEl.style.color = 'var(--text-secondary)'; 
      } 
      this.saveConfig(); 
    } catch (e) { 
      const titleEl = document.getElementById(`title-${slot}`); 
      if (titleEl) { 
        titleEl.innerText = 'Connected'; 
        titleEl.style.color = 'var(--text-secondary)'; 
      } 
      this.saveConfig(); 
    } 
  }

  _ensureSlotState(slot) { 
    if (!this.slotStates[slot]) { 
      this.slotStates[slot] = { vidId: null, timerId: null, lastFetchTime: 0, fetching: false, realtimeActive: false, originalUrl: null }; 
    } 
  }
  
  _startRealtimeLoop(slot) { 
    this._ensureSlotState(slot); 
    this.slotStates[slot].realtimeActive = true; 
    this._fetchAndUpdate(slot).finally(() => this._scheduleNextFetch(slot)); 
  }
  
  _stopRealtimeLoop(slot) { 
    const st = this.slotStates[slot]; 
    if (!st) return; 
    st.realtimeActive = false; 
    if (st.timerId) { 
      clearTimeout(st.timerId); 
      st.timerId = null; 
    } 
  }
  
  _scheduleNextFetch(slot) { 
    const st = this.slotStates[slot]; 
    if (!st || !st.realtimeActive) return; 
    const elapsed = st.lastFetchTime ? (Date.now() - st.lastFetchTime) : this.MIN_INTERVAL_MS; 
    const wait = Math.max(0, this.MIN_INTERVAL_MS - elapsed); 
    st.timerId = setTimeout(async () => { 
      if (!st.realtimeActive) return; 
      await this._fetchAndUpdate(slot); 
      this._scheduleNextFetch(slot); 
    }, wait); 
  }

  async _fetchAndUpdate(slot) { 
    const st = this.slotStates[slot]; 
    if (!st || !st.vidId || st.fetching) return; 
    st.fetching = true; 
    try { 
      const html = await this._fetchYouTubePage(st.vidId); 
      st.lastFetchTime = Date.now(); 
      if (!html) { 
        this._updateBadgeText(slot, '—'); 
        return; 
      } 
      const data = this._extractViewerData(html); 
      let num = null; 
      if (data.concurrentViewers) num = this._parseNumber(data.concurrentViewers); 
      else if (data.viewCountText) num = this._parseNumber(data.viewCountText); 
      else if (data.totalViews) num = this._parseNumber(data.totalViews); 
      if (num !== null && !isNaN(num)) { 
        this._updateBadgeText(slot, this._formatNumber(num)); 
      } else if (data.viewCountText) { 
        this._updateBadgeText(slot, data.viewCountText.replace(/\s+$/,'').replace(/watching.*/i,'').trim()); 
      } else { 
        this._updateBadgeText(slot, '—'); 
      } 
    } catch (e) { 
      this._updateBadgeText(slot, '—'); 
    } finally { 
      st.fetching = false; 
    } 
  }

  _updateBadgeText(slot, numText) { 
    const container = document.getElementById(`badge-content-${slot}`); 
    if (!container) return; 
    container.innerHTML = `<span>${this._escapeHtml(String(numText))}</span>${this.userIconSVG}`; 
  }
  
  _escapeHtml(s) { 
    return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); 
  }

  async _fetchYouTubePage(vidId) { 
    const url = `https://www.youtube.com/watch?v=${vidId}&t=${Date.now()}`; 
    const promises = this.CORS_PROXIES.map(makeProxy => new Promise(async (resolve, reject) => { 
      const proxy = makeProxy(url); 
      const controller = new AbortController(); 
      const to = setTimeout(() => controller.abort(), this.FETCH_TIMEOUT); 
      try { 
        const res = await fetch(proxy, { signal: controller.signal, headers: { 'Accept': 'text/html' }, cache: 'no-store' }); 
        clearTimeout(to); 
        if (!res.ok) return reject(); 
        const text = await res.text(); 
        if (!text || text.length < 800 || (!text.includes('ytInitialData') && !text.includes('ytInitialPlayerResponse'))) return reject(); 
        return resolve(text); 
      } catch (err) { 
        clearTimeout(to); 
        return reject(err); 
      } 
    })); 
    try { 
      return typeof Promise.any === 'function' ? await Promise.any(promises) : null; 
    } catch (e) { 
      return null; 
    } 
  }

  _extractEmbeddedJSON(html, varName) { 
    if (!html || !varName) return null; 
    const idx = html.indexOf(varName); 
    if (idx === -1) return null; 
    let start = html.indexOf('{', idx); 
    if (start === -1) return null; 
    let depth = 0, inStr = false, esc = false; 
    for (let i = start; i < html.length; i++) { 
      const ch = html[i]; 
      if (esc) { esc = false; continue; } 
      if (ch === '\\') { esc = true; continue; } 
      if (ch === '"') { inStr = !inStr; continue; } 
      if (inStr) continue; 
      if (ch === '{') depth++; 
      else if (ch === '}') { 
        depth--; 
        if (depth === 0) { 
          try { return JSON.parse(html.substring(start, i+1)); } catch(e){ return null; } 
        } 
      } 
    } 
    return null; 
  }

  _extractViewerData(html) { 
    const result = { concurrentViewers: null, totalViews: null, isLive: false, isLiveNow: false, title: null, viewCountText: null }; 
    let pr = this._extractEmbeddedJSON(html, 'ytInitialPlayerResponse'); 
    if (!pr) pr = this._extractEmbeddedJSON(html, 'window["ytInitialPlayerResponse"]') || this._extractEmbeddedJSON(html, 'window.ytInitialPlayerResponse'); 
    if (pr) { 
      const vd = pr.videoDetails; 
      if (vd) { 
        result.title = vd.title || null; 
        result.totalViews = vd.viewCount || null; 
        result.isLive = !!vd.isLive || !!vd.isLiveContent; 
      } 
      const lbd = pr?.microformat?.playerMicroformatRenderer?.liveBroadcastDetails; 
      if (lbd) { 
        if (lbd.concurrentViewers) result.concurrentViewers = lbd.concurrentViewers; 
        result.isLiveNow = !!lbd.isLiveNow || result.isLive; 
      } 
    } 
    const init = this._extractEmbeddedJSON(html, 'ytInitialData'); 
    if (init) { 
      try { 
        const contents = init?.contents?.twoColumnWatchNextResults?.results?.results?.contents; 
        if (contents && Array.isArray(contents)) { 
          for (const item of contents) { 
            const vcr = item?.videoPrimaryInfoRenderer?.viewCount?.videoViewCountRenderer; 
            if (vcr) { 
              if (vcr.viewCount?.simpleText) result.viewCountText = vcr.viewCount.simpleText; 
              else if (vcr.viewCount?.runs) result.viewCountText = vcr.viewCount.runs.map(r=>r.text).join(''); 
              if (vcr.isLive) result.isLiveNow = true; 
            } 
          } 
        } 
      } catch(e){} 
    } 
    if (!result.concurrentViewers && !result.viewCountText) { 
      const m1 = html.match(/"concurrentViewers"\s*:\s*"(\d+)"/i); 
      if (m1) { 
        result.concurrentViewers = m1[1]; 
        result.isLiveNow = true; 
      } 
    } 
    return result; 
  }

  _parseNumber(s) { 
    if (s == null) return null; 
    const m = String(s).match(/([\d.,]+)/); 
    if (!m) return null; 
    const digits = m[1].replace(/[^\d]/g, ''); 
    return digits ? parseInt(digits, 10) : null; 
  }
  
  _formatNumber(n) { 
    if (typeof n !== 'number') n = Number(n) || 0; 
    return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
  }
  
  getId(url) { 
    if (!url) return null; 
    url = url.trim(); 
    if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url; 
    const m = url.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/live\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/); 
    if (m) return m[1]; 
    try { 
      const v = new URL(url).searchParams.get('v'); 
      if (v && /^[A-Za-z0-9_-]{11}$/.test(v)) return v; 
    } catch(e){} 
    return null; 
  }
}

const app = new StreamApp();
window.app = app;

document.getElementById('modal-url')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') window.app.confirmModal(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') app.closeModal(); });
    </script>
